<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LockIt</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top left,#c7d2fe,transparent 35%),
    radial-gradient(circle at top right,#fbcfe8,transparent 35%),
    linear-gradient(135deg,#f8fafc,#eef2ff);
  color:#0f172a;
}
.app{max-width:480px;margin:auto;padding:22px}
.logo{font-size:42px;font-weight:1000;letter-spacing:-2px;margin-top:25px}
.tag{color:#64748b;font-size:15px;margin-top:6px}
.card{
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.9);
  border-radius:28px;
  padding:22px;
  margin-top:16px;
  box-shadow:0 20px 50px rgba(15,23,42,.12);
}
input{
  width:100%;
  padding:16px;
  margin:8px 0;
  border-radius:18px;
  border:1px solid #e2e8f0;
  background:#f8fafc;
  font-size:15px;
  outline:none;
}
input:focus{
  border-color:#6366f1;
  box-shadow:0 0 0 4px rgba(99,102,241,.15);
  background:white;
}
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  font-weight:900;
  font-size:15px;
  margin-top:10px;
  cursor:pointer;
}
button:hover{transform:translateY(-1px)}
.primary{
  color:white;
  background:linear-gradient(135deg,#111827,#4f46e5);
  box-shadow:0 15px 30px rgba(79,70,229,.25);
}
.secondary{background:#eef2ff;color:#3730a3}
.hidden{display:none}
.small{font-size:13px;color:#64748b;line-height:1.45}
.option{
  margin-top:12px;
  padding:16px;
  border-radius:22px;
  background:linear-gradient(135deg,#f8fafc,#eef2ff);
  border:1px solid #e5e7eb;
}
.optionTop{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
}
.voteBtns{display:flex;gap:8px}
.voteBtns button{
  width:48px;
  height:48px;
  padding:0;
  margin:0;
  font-size:20px;
}
.yes{background:#dcfce7}
.no{background:#fee2e2}
.locked{
  background:linear-gradient(135deg,#111827,#4f46e5);
  color:white;
  padding:18px;
  border-radius:22px;
  margin-top:16px;
  text-align:center;
  font-weight:1000;
  display:none;
}
.linkbox{
  background:#f8fafc;
  border:1px dashed #818cf8;
  border-radius:18px;
  padding:14px;
  font-size:13px;
  word-break:break-all;
}
label{
  display:flex;
  gap:10px;
  align-items:center;
  background:#f8fafc;
  border-radius:18px;
  padding:14px;
  margin-top:8px;
}
label input{width:auto}
.badge{
  display:inline-block;
  background:#eef2ff;
  color:#3730a3;
  padding:7px 11px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}
</style>
</head>

<body>

<div class="app">

  <div class="logo">🔒 LockIt</div>
  <div class="tag">Create once. Share the link. Everyone votes live.</div>

  <div id="createCard" class="card">
    <h2>Create a Plan</h2>

    <input id="title" placeholder="Plan name">
    <input id="location" placeholder="Location">

    <input id="opt1" placeholder="Time option 1">
    <input id="opt2" placeholder="Time option 2">

    <button class="secondary" onclick="toggleThird()">+ Add 3rd option</button>
    <input id="opt3" class="hidden" placeholder="Time option 3">

    <input id="creator" placeholder="Your name">

    <label>
      <input type="checkbox" id="ride">
      I can provide a ride 🚗
    </label>

    <button class="primary" onclick="createPlan()">Create Plan</button>
  </div>

  <div id="shareCard" class="card hidden">
    <h3>Share this link</h3>
    <div id="shareLink" class="linkbox"></div>
    <button class="secondary" onclick="copyLink()">Copy Link</button>
  </div>

  <div id="planCard" class="card hidden">
    <span class="badge">Live Plan</span>
    <h2 id="showTitle"></h2>
    <p id="showLocation" class="small"></p>
    <p id="showRide" class="small"></p>

    <input id="voterName" placeholder="Your name to vote">

    <div id="options"></div>

    <button class="primary" onclick="lockPlan()">Lock Best Plan</button>
  </div>

  <div id="lockedBox" class="locked"></div>

</div>

<script>
const SUPABASE_URL = "https://xgotscgbwzyloxriyamr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhnb3RzY2did3p5bG94cml5YW1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNzA0OTksImV4cCI6MjA5MjY0NjQ5OX0.04WmghiRvFlJGl0bZSMRd_OKxTCpITKZgKpEm7RHyW0";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let planId = new URLSearchParams(window.location.search).get("plan");
let currentPlan = null;

const $ = id => document.getElementById(id);

function toggleThird(){
  $("opt3").classList.toggle("hidden");
}

async function createPlan(){
  const title = $("title").value.trim();
  const location = $("location").value.trim();
  const creator = $("creator").value.trim();
  const ride = $("ride").checked;

  const rawOptions = [
    $("opt1").value.trim(),
    $("opt2").value.trim(),
    $("opt3").value.trim()
  ].filter(Boolean);

  if(!title || !creator || rawOptions.length < 2){
    alert("Add a title, your name, and at least 2 time options.");
    return;
  }

  planId = crypto.randomUUID();

  const plan = {
    id: planId,
    title,
    location,
    creator,
    ride,
    locked:false,
    lockedChoice:"",
    options: rawOptions.map(text => ({
      text,
      yes:[],
      no:[]
    }))
  };

  const { error } = await supabaseClient
    .from("plans")
    .insert([{ id: planId, data: plan }]);

  if(error){
    alert("Error creating plan: " + error.message);
    return;
  }

  const link = locationWithoutQuery() + "?plan=" + planId;
  window.history.pushState(null,"",link);

  $("shareLink").innerText = link;
  $("shareCard").classList.remove("hidden");

  currentPlan = plan;
  renderPlan();

  $("createCard").classList.add("hidden");
  $("planCard").classList.remove("hidden");

  listenForUpdates();
}

async function loadPlan(){
  if(!planId) return;

  $("createCard").classList.add("hidden");
  $("planCard").classList.remove("hidden");
  $("shareCard").classList.remove("hidden");
  $("shareLink").innerText = locationWithoutQuery() + "?plan=" + planId;

  const { data, error } = await supabaseClient
    .from("plans")
    .select("*")
    .eq("id", planId)
    .single();

  if(error || !data){
    alert("Plan not found.");
    return;
  }

  currentPlan = data.data;
  renderPlan();
  listenForUpdates();
}

async function savePlan(){
  const { error } = await supabaseClient
    .from("plans")
    .update({ data: currentPlan })
    .eq("id", planId);

  if(error){
    alert("Save error: " + error.message);
  }
}

async function vote(index,type){
  const name = $("voterName").value.trim();

  if(!name){
    alert("Enter your name first.");
    return;
  }

  if(currentPlan.locked){
    alert("This plan is locked.");
    return;
  }

  currentPlan.options.forEach(opt=>{
    opt.yes = opt.yes.filter(n=>n!==name);
    opt.no = opt.no.filter(n=>n!==name);
  });

  if(type === "yes"){
    currentPlan.options[index].yes.push(name);
  } else {
    currentPlan.options[index].no.push(name);
  }

  await savePlan();
  renderPlan();
}

async function lockPlan(){
  if(!currentPlan || currentPlan.locked) return;

  let best = currentPlan.options[0];

  currentPlan.options.forEach(opt=>{
    if((opt.yes.length - opt.no.length) > (best.yes.length - best.no.length)){
      best = opt;
    }
  });

  currentPlan.locked = true;
  currentPlan.lockedChoice = best.text;

  await savePlan();
  renderPlan();
}

function renderPlan(){
  $("showTitle").innerText = currentPlan.title;
  $("showLocation").innerText = "📍 " + (currentPlan.location || "No location");
  $("showRide").innerText = currentPlan.ride
    ? "🚗 " + currentPlan.creator + " can provide a ride"
    : "No ride offered";

  $("options").innerHTML = "";

  currentPlan.options.forEach((opt,i)=>{
    $("options").innerHTML += `
      <div class="option">
        <div class="optionTop">
          <div>
            <strong>${opt.text}</strong><br>
            <span class="small">👍 ${opt.yes.length} yes · 👎 ${opt.no.length} no</span>
          </div>
          <div class="voteBtns">
            <button class="yes" onclick="vote(${i},'yes')">👍</button>
            <button class="no" onclick="vote(${i},'no')">👎</button>
          </div>
        </div>
        <p class="small">
          <b>Yes:</b> ${opt.yes.join(", ") || "none"}<br>
          <b>No:</b> ${opt.no.join(", ") || "none"}
        </p>
      </div>
    `;
  });

  if(currentPlan.locked){
    $("lockedBox").style.display = "block";
    $("lockedBox").innerText = "🔒 Locked Plan: " + currentPlan.lockedChoice;
  } else {
    $("lockedBox").style.display = "none";
  }
}

function listenForUpdates(){
  if(!planId) return;

  supabaseClient
    .channel("plans-" + planId)
    .on(
      "postgres_changes",
      {
        event: "UPDATE",
        schema: "public",
        table: "plans",
        filter: "id=eq." + planId
      },
      payload => {
        currentPlan = payload.new.data;
        renderPlan();
      }
    )
    .subscribe();
}

function copyLink(){
  navigator.clipboard.writeText($("shareLink").innerText);
  alert("Link copied!");
}

function locationWithoutQuery(){
  return window.location.origin + window.location.pathname;
}

loadPlan();
</script>

</body>
</html>
